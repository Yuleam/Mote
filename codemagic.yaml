workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
      vars:
        BUNDLE_ID: "app.purl.knitting"
        APP_NAME: "Purl"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: 루트 npm 설치
        script: npm install
      - name: 웹 빌드 (www/ 생성)
        script: npm run build:web
      - name: iOS 플랫폼 추가 + 동기화
        script: |
          npx cap add ios || echo "iOS platform already exists"
          npx cap sync ios
      - name: 키체인 초기화
        script: keychain initialize
      - name: 인증서 키 생성 + 서명 파일
        script: |
          openssl req -nodes -newkey rsa:2048 -keyout /tmp/cert_key.pem -out /tmp/cert_csr.pem -subj "/"
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
      - name: 키체인에 인증서 등록
        script: keychain add-certificates
      - name: 서명 프로파일 적용
        script: xcode-project use-profiles
      - name: 빌드 번호 설정 + IPA 빌드
        script: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          echo "=== 빌드 번호: $BUILD_NUM ==="

          cd ios/App

          # Info.plist를 XML로 변환 후 수정
          find . -name "Info.plist" -not -path "*/Pods/*" | while read plist; do
            plutil -convert xml1 "$plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$plist"
            echo "$plist -> $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$plist")"
          done

          # xcodebuild로 직접 빌드 (CURRENT_PROJECT_VERSION 강제)
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CURRENT_PROJECT_VERSION="$BUILD_NUM" \
            MARKETING_VERSION="1.0" \
            -allowProvisioningUpdates \
            | xcpretty || true

          # export
          cat > /tmp/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /tmp/exportOptions.plist \
            -exportPath build/ios/ipa \
            | xcpretty || true

          echo "=== IPA 확인 ==="
          ls -la build/ios/ipa/
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
