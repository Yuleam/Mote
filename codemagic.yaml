workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
      vars:
        BUNDLE_ID: "app.purl.knitting"
        APP_NAME: "Purl"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: 루트 npm 설치
        script: npm install
      - name: 웹 빌드 (www/ 생성)
        script: npm run build:web
      - name: iOS 플랫폼 추가
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Xcode 프로젝트 설정
        script: |
          cd ios/App
          pod install
      - name: 서명 파일 생성
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
      - name: 서명 프로파일 적용
        script: xcode-project use-profiles
      - name: IPA 빌드
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
